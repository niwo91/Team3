<!DOCTYPE html>
<html>
    <head>
	<meta charset="utf-8" /> 
        <title>Categories</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
	    <h1>AnonReview Post Categories</h1>
	    <table {border: 1px solid black; }>
            <tr>
              <th>Name</th>
              <th>Description</th>
            </tr>
            {%for category in data%}
               <tr>
                 <td>{{category[1]}}</td>
                 <td>{{category[2]}}</td>
                </tr>
            {%endfor%}
          </table>          
    </body>
</html>

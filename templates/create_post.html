<!doctype html>
<html lang="en-US">
<head>
    <meta charset="utf-8" />
    <title>Create Post – AnonReview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">

        <!-- Top navigation row -->
        <div class="top-bar">
            <a class="back-button" href="{{ url_for('dashboard') }}">← Back</a>
            <a class="logout-button" href="{{ url_for('logout') }}">Log Out</a>
        </div>

        <h1>Create a New Post</h1>
        <p class="subtitle small-subtitle">Share your thoughts and attach a file if needed</p>

        <form method="POST" enctype="multipart/form-data">

            <div class="form-field">
                <input type="text" name="title" placeholder="Post Title" required>
            </div>

            <div class="form-field">
                <textarea name="body" placeholder="Write your post..." required></textarea>
            </div>

            <div class="form-field">
                <input type="file" name="file">
            </div>

            <div class="form-field">
                <select name="category_id">
                    {% for c in categories %}
                        <option value="{{ c.category_id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-field">
                <button type="submit">Create Post</button>
            </div>

        </form>

    </div>
</body>
</html>
